<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Fraud Detective — EXL AI Claims Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Special+Elite&family=Oswald:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════════
       PART 1 — DESIGN TOKENS
    ═══════════════════════════════════════════════════ */
    :root {
      --exl-orange:       #FF6B35;
      --exl-orange-dark:  #C94E20;
      --exl-orange-glow:  rgba(255,107,53,.35);
      --exl-bg:           #080A0F;
      --exl-surface:      #10131A;
      --exl-surface2:     #181C28;
      --exl-surface3:     #1E2235;
      --exl-border:       #252A3A;
      --exl-border-lit:   #3A4060;
      --exl-text:         #DDE2F0;
      --exl-text-soft:    #A8B0CC;
      --exl-muted:        #5A627A;
      --green:  #22D07A;
      --red:    #F05050;
      --purple: #9B72F8;
      font-family: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow-x: hidden; }

    body {
      background: var(--exl-bg);
      color: var(--exl-text);
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4 { font-family: 'Syne', sans-serif; }

    /* ═══════════════════════════════════════════════════
       PART 4 — SCENARIO ATMOSPHERIC BACKGROUNDS
    ═══════════════════════════════════════════════════ */

    /* Auto-Collision / Hasty Claim — dim streetlight, asphalt */
    .scene-auto-collision {
      background:
        radial-gradient(ellipse 35% 55% at 15% 0%, rgba(255,200,60,.06) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 85% 100%, rgba(40,50,80,.9) 0%, transparent 60%),
        linear-gradient(175deg, #060810 0%, #0D1120 50%, #070A14 100%);
    }
    /* Subtle streetlight flicker */
    @keyframes flicker {
      0%,95%,100%{opacity:1} 96%{opacity:.7} 97%{opacity:.95} 98%{opacity:.6} 99%{opacity:.9}
    }
    .scene-auto-collision::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background: radial-gradient(ellipse 20% 40% at 18% 5%, rgba(255,200,80,.04) 0%, transparent 70%);
      animation: flicker 8s ease infinite;
    }

    /* Water Damage — cool blue mist */
    .scene-water {
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(30,80,160,.18) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 10% 80%, rgba(20,60,130,.15) 0%, transparent 50%),
        linear-gradient(170deg, #06090F 0%, #0B1020 60%, #060A10 100%);
    }
    @keyframes ripple {
      0%{transform:scale(1);opacity:.06} 50%{transform:scale(1.08);opacity:.03} 100%{transform:scale(1);opacity:.06}
    }
    .scene-water::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background: radial-gradient(ellipse 70% 20% at 50% 100%, rgba(40,100,220,.08) 0%, transparent 100%);
      animation: ripple 5s ease-in-out infinite;
    }

    /* Auto Theft / Parking Garage — dark concrete, sodium lamp */
    .scene-auto-theft {
      background:
        radial-gradient(ellipse 30% 30% at 60% 20%, rgba(255,180,40,.05) 0%, transparent 60%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.005) 0px, rgba(255,255,255,.005) 1px, transparent 1px, transparent 60px),
        linear-gradient(180deg, #080A0D 0%, #0E1015 50%, #080A0D 100%);
    }

    /* Fire Damage — ember warmth */
    .scene-fire {
      background:
        radial-gradient(ellipse 60% 60% at 50% 80%, rgba(220,80,20,.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 20% 90%, rgba(180,50,10,.08) 0%, transparent 50%),
        linear-gradient(175deg, #080808 0%, #100C08 60%, #080808 100%);
    }
    @keyframes ember {
      0%,100%{opacity:.08;transform:translateY(0) scale(1)} 50%{opacity:.14;transform:translateY(-4px) scale(1.05)}
    }
    .scene-fire::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background: radial-gradient(ellipse 50% 30% at 50% 100%, rgba(255,100,20,.1) 0%, transparent 100%);
      animation: ember 4s ease-in-out infinite;
    }

    /* ═══════════════════════════════════════════════════
       KEYFRAMES — MICRO-INTERACTIONS
    ═══════════════════════════════════════════════════ */
    @keyframes fadeUp    { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    @keyframes scaleIn   { from{opacity:0;transform:scale(.93)} to{opacity:1;transform:scale(1)} }
    @keyframes slideRight{ from{opacity:0;transform:translateX(-16px)} to{opacity:1;transform:translateX(0)} }
    @keyframes glowPulse { 0%,100%{box-shadow:0 0 0 0 var(--exl-orange-glow)} 50%{box-shadow:0 0 0 10px rgba(255,107,53,0)} }
    @keyframes timerPulse{ 0%,100%{background:rgba(220,38,38,.12)} 50%{background:rgba(220,38,38,.3)} }
    @keyframes scoreFlash{ 0%{transform:scale(1)} 40%{transform:scale(1.18);color:#22D07A} 100%{transform:scale(1)} }
    @keyframes labScan   { 0%{background-position:0 0} 100%{background-position:0 100%} }
    @keyframes pulse2    { 0%,100%{opacity:1} 50%{opacity:.5} }
    @keyframes revealGlow{ 0%{box-shadow:0 0 0 0 rgba(155,114,248,.4)} 60%{box-shadow:0 0 40px 8px rgba(155,114,248,.15)} 100%{box-shadow:0 0 0 0 rgba(155,114,248,0)} }
    @keyframes stagger1  { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

    .fade-up      { animation: fadeUp .42s ease both; }
    .scale-in     { animation: scaleIn .35s ease both; }
    .slide-right  { animation: slideRight .38s ease both; }
    .glow-pulse   { animation: glowPulse 2.2s ease infinite; }
    .pulse2       { animation: pulse2 2s ease infinite; }
    .reveal-glow  { animation: revealGlow .9s ease both; }

    /* Staggered entrance */
    .s1{animation:stagger1 .4s .04s ease both}
    .s2{animation:stagger1 .4s .10s ease both}
    .s3{animation:stagger1 .4s .16s ease both}
    .s4{animation:stagger1 .4s .22s ease both}
    .s5{animation:stagger1 .4s .28s ease both}

    /* Timer danger */
    .timer-danger { animation: timerPulse .7s ease infinite; }

    /* Score flash */
    .score-flash  { animation: scoreFlash .5s ease both; }

    /* ═══════════════════════════════════════════════════
       COMPONENTS
    ═══════════════════════════════════════════════════ */

    /* Glass card */
    .g-card {
      background: rgba(16,19,26,.85);
      border: 1px solid var(--exl-border);
      border-radius: 14px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .g-card-accent {
      background: rgba(16,19,26,.9);
      border: 1.5px solid var(--exl-orange);
      border-radius: 14px;
    }

    /* Evidence hover glow */
    .evidence-hover {
      transition: border-color .22s, box-shadow .22s, transform .22s;
    }
    .evidence-hover:hover {
      border-color: rgba(255,107,53,.4) !important;
      box-shadow: 0 4px 24px rgba(255,107,53,.1);
      transform: translateY(-1px);
    }

    /* Case card */
    .case-card {
      background: var(--exl-surface);
      border: 1px solid var(--exl-border);
      border-radius: 16px;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, transform .2s, background .2s;
      position: relative;
      overflow: hidden;
    }
    .case-card::after {
      content:'';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--exl-orange);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform .22s ease;
      border-radius: 3px 0 0 3px;
    }
    .case-card:hover { border-color: var(--exl-border-lit); box-shadow: 0 6px 32px rgba(0,0,0,.5), 0 0 0 1px rgba(255,107,53,.15); transform: translateY(-2px); }
    .case-card:hover::after { transform: scaleY(1); }

    .exl-logo-wrap {
      display: flex;
      align-items: center;
      gap: .6rem;
    }
    .exl-logo-text {
      display: flex;
      flex-direction: column;
      gap: .05rem;
    }
    .exl-logo-sub {
      font-size: .65rem;
      letter-spacing: .14em;
      color: var(--exl-muted);
      text-transform: uppercase;
      font-family: 'Oswald', sans-serif;
      font-weight: 300;
    }

    /* Scan line effect for AI reveals */
    .ai-scan {
      position: relative;
      overflow: hidden;
    }
    .ai-scan::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(155,114,248,.6), transparent);
      animation: labScan 1.2s ease both;
      top: 0;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--exl-surface); }
    ::-webkit-scrollbar-thumb { background: var(--exl-border-lit); border-radius: 3px; }

    /* Input */
    .exl-input {
      background: var(--exl-surface2);
      border: 1.5px solid var(--exl-border);
      color: var(--exl-text);
      border-radius: 10px;
      padding: .85rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      width: 100%;
      transition: border-color .18s, box-shadow .18s;
      outline: none;
    }
    .exl-input:focus { border-color: var(--exl-orange); box-shadow: 0 0 0 3px rgba(255,107,53,.12); }
    .exl-input::placeholder { color: var(--exl-muted); }

    /* Badges */
    .badge { border-radius: 20px; padding: .22rem .7rem; font-size: .7rem; font-weight: 700; letter-spacing: .06em; display: inline-block; }
    .badge-easy   { background: rgba(34,208,122,.13); color: #22D07A; border: 1px solid rgba(34,208,122,.3); }
    .badge-medium { background: rgba(234,179,8,.12);  color: #FBBF24; border: 1px solid rgba(234,179,8,.3); }
    .badge-hard   { background: rgba(240,80,80,.13);  color: #F87171; border: 1px solid rgba(240,80,80,.3); }

    /* Buttons */
    .exl-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: .45rem;
      font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; border: none;
      transition: opacity .16s, transform .16s, box-shadow .16s;
    }
    .exl-btn:hover:not(:disabled) { opacity: .87; transform: translateY(-1px); }
    .exl-btn:active:not(:disabled) { transform: scale(.97); opacity: 1; }
    .exl-btn:disabled { opacity: .38; cursor: not-allowed; }

    .exl-btn-primary {
      background: linear-gradient(135deg, var(--exl-orange) 0%, var(--exl-orange-dark) 100%);
      color: #fff;
      border-radius: 10px;
      padding: .85rem 2.2rem;
      font-size: .97rem;
      box-shadow: 0 4px 22px rgba(255,107,53,.3);
      letter-spacing: .02em;
    }
    .exl-btn-primary:hover:not(:disabled) { box-shadow: 0 6px 30px rgba(255,107,53,.5); }

    .exl-btn-ghost {
      background: transparent;
      color: var(--exl-orange);
      border: 1.5px solid rgba(255,107,53,.5);
      border-radius: 10px;
      padding: .75rem 1.8rem;
      font-size: .93rem;
    }
    .exl-btn-ghost:hover:not(:disabled) { border-color: var(--exl-orange); }

    /* Round dot */
    .round-dot { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.68rem; font-weight:700; flex-shrink:0; transition:background .25s, box-shadow .25s; }
    .round-dot-active { box-shadow: 0 0 0 3px rgba(255,107,53,.25); }

    /* ── PART 5 — CLIPBOARD / CLAIM NOTES ── */
    .clipboard-panel {
      background: #F5F0E8;
      border-radius: 4px 12px 12px 4px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,.5), inset 0 0 0 1px rgba(0,0,0,.08);
    }
    .clipboard-clip {
      position: absolute;
      top: -8px; left: 50%;
      transform: translateX(-50%);
      width: 60px; height: 22px;
      background: #8C7B6A;
      border-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,.4);
      z-index: 2;
    }
    .clipboard-clip::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 28px; height: 8px;
      background: #6B5A4A;
      border-radius: 3px;
    }
    .clipboard-lines {
      background-image: repeating-linear-gradient(
        180deg,
        transparent, transparent 27px,
        rgba(100,140,200,.18) 27px, rgba(100,140,200,.18) 28px
      );
      position: absolute; inset: 0; pointer-events: none; z-index: 1;
    }
    .clipboard-margin {
      position: absolute;
      left: 48px; top: 0; bottom: 0;
      width: 1px;
      background: rgba(220,80,60,.25);
    }
    .clipboard-content {
      position: relative; z-index: 3;
      padding: 1.5rem 1.25rem 1.25rem 3.75rem;
      font-family: 'Special Elite', serif;
      color: #2C2418;
      font-size: .88rem;
      line-height: 1.78;
      letter-spacing: .01em;
      max-height: 220px;
      overflow-y: auto;
    }
    .clipboard-content::-webkit-scrollbar { width: 4px; }
    .clipboard-content::-webkit-scrollbar-thumb { background: rgba(100,80,60,.3); }
    .clipboard-stamp {
      position: absolute;
      bottom: 1rem; right: 1.25rem;
      font-family: 'Syne', sans-serif;
      font-size: .6rem;
      letter-spacing: .14em;
      color: rgba(180,60,30,.5);
      border: 1.5px solid rgba(180,60,30,.3);
      border-radius: 3px;
      padding: .2rem .5rem;
      text-transform: uppercase;
      transform: rotate(-4deg);
      z-index: 4;
    }

    /* ── AI Confidence Gauge (Reveal) ── */
    .gauge-track {
      height: 6px;
      background: var(--exl-border);
      border-radius: 3px;
      overflow: hidden;
    }
    .gauge-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .8s cubic-bezier(.4,0,.2,1);
    }

    /* Evidence block */
    .ev-block {
      background: var(--exl-surface2);
      border: 1px solid var(--exl-border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
    }

    /* Data pill */
    .data-pill {
      background: rgba(8,10,15,.6);
      border: 1px solid var(--exl-border);
      border-radius: 8px;
      padding: .55rem .8rem;
      transition: border-color .18s;
    }
    .data-pill:hover { border-color: var(--exl-border-lit); }

    /* Divider */
    .divider { height:1px; background:var(--exl-border); margin:1.1rem 0; }

    /* LB row */
    .lb-row { border-radius: 12px; padding: .8rem 1rem; display: flex; align-items: center; gap: .9rem; }

    /* orange text util */
    .text-exl { color: var(--exl-orange); }

    /* ── CINEMATIC OVERLAYS ── */
    /* Grain noise */
    body::after {
      content:''; position:fixed; inset:0; z-index:9998; pointer-events:none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
      opacity: .5;
    }
    /* Vignette */
    body::before {
      content:''; position:fixed; inset:0; z-index:9997; pointer-events:none;
      background: radial-gradient(ellipse 85% 80% at 50% 50%, transparent 40%, rgba(0,0,0,.55) 100%);
    }

    /* ── SOUND TOGGLE ── */
    .sound-toggle {
      position:fixed; top:1rem; right:1rem; z-index:10000;
      background:rgba(16,19,26,.85); border:1px solid var(--exl-border);
      border-radius:8px; padding:.4rem .65rem;
      display:flex; align-items:center; gap:.4rem;
      cursor:pointer; font-size:.7rem; color:var(--exl-muted);
      letter-spacing:.08em; backdrop-filter:blur(8px);
      transition:border-color .18s, color .18s;
    }
    .sound-toggle:hover { border-color:var(--exl-border-lit); color:var(--exl-text-soft); }

    /* ── CASE SELECTION TILES ── */
    .case-tile {
      position:relative; overflow:hidden; cursor:pointer;
      border-radius:18px;
      border:1.5px solid var(--exl-border);
      background:var(--exl-surface);
      transition:border-color .28s, box-shadow .28s, transform .28s;
      padding:1.6rem 1.5rem 1.4rem;
      min-height:200px;
      display:flex; flex-direction:column; justify-content:space-between;
    }
    .case-tile::before {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse 90% 60% at 50% 120%, var(--tile-glow,rgba(255,107,53,.12)) 0%, transparent 70%);
      opacity:0; transition:opacity .3s;
    }
    .case-tile:hover { border-color:rgba(255,107,53,.55); box-shadow:0 8px 40px rgba(0,0,0,.6), 0 0 0 1px rgba(255,107,53,.15), inset 0 0 30px rgba(255,107,53,.04); transform:translateY(-3px) scale(1.012); }
    .case-tile:hover::before { opacity:1; }
    .case-tile-num {
      font-family:'Bebas Neue',sans-serif; font-size:4rem; line-height:1;
      color:rgba(255,255,255,.06); position:absolute; bottom:-.8rem; right:.8rem;
      pointer-events:none; user-select:none;
      transition:color .28s;
    }
    .case-tile:hover .case-tile-num { color:rgba(255,107,53,.12); }

    /* ── CINEMATIC TITLE SCREEN ── */
    @keyframes titleReveal {
      from { opacity:0; transform:translateY(32px) scaleX(.96); letter-spacing:.12em; }
      to   { opacity:1; transform:translateY(0) scaleX(1); }
    }
    @keyframes taglineReveal {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes scanLine {
      0%   { top:-2px; }
      100% { top:100%; }
    }
    @keyframes bgDrift {
      0%,100% { transform:scale(1) translateY(0); }
      50%     { transform:scale(1.04) translateY(-8px); }
    }
    @keyframes pulseRing {
      0%   { box-shadow:0 0 0 0 rgba(255,107,53,.4); }
      70%  { box-shadow:0 0 0 14px rgba(255,107,53,0); }
      100% { box-shadow:0 0 0 0 rgba(255,107,53,0); }
    }
    @keyframes countUp {
      from { opacity:0; transform:scale(.8); }
      to   { opacity:1; transform:scale(1); }
    }
    @keyframes ringPulse {
      0%,100% { opacity:1; r:8; }
      50%     { opacity:.4; r:12; }
    }
    @keyframes lineDraw {
      from { stroke-dashoffset:200; }
      to   { stroke-dashoffset:0; }
    }
    .title-main {
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(4.5rem,10vw,9rem);
      letter-spacing:.05em;
      line-height:.9;
      background:linear-gradient(160deg,#fff 30%,rgba(255,200,160,.8) 60%,var(--exl-orange) 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      animation:titleReveal .9s .3s cubic-bezier(.16,1,.3,1) both;
    }
    .title-tagline {
      font-family:'Oswald',sans-serif;
      font-weight:300;
      font-size:clamp(.9rem,2vw,1.3rem);
      letter-spacing:.22em;
      color:rgba(255,255,255,.45);
      text-transform:uppercase;
      animation:taglineReveal .8s .9s ease both;
    }

    /* ── LIFELINE REDESIGN ── */
    .lifeline-btn {
      display:flex; align-items:center; gap:.7rem;
      background:linear-gradient(135deg,rgba(155,114,248,.15),rgba(100,60,200,.08));
      border:1.5px solid rgba(155,114,248,.4);
      border-radius:12px; padding:.65rem 1.1rem;
      cursor:pointer; transition:all .22s;
      color:#C4A9FF;
    }
    .lifeline-btn:hover:not(:disabled) {
      background:linear-gradient(135deg,rgba(155,114,248,.25),rgba(100,60,200,.15));
      border-color:rgba(155,114,248,.7);
      box-shadow:0 0 20px rgba(155,114,248,.2);
      transform:translateY(-1px);
    }
    .lifeline-btn:disabled { opacity:.35; cursor:not-allowed; }

    @keyframes lifelineActivate {
      0%  { box-shadow:0 0 0 0 rgba(155,114,248,.8); }
      50% { box-shadow:0 0 30px 8px rgba(155,114,248,.3); }
      100%{ box-shadow:0 0 0 0 rgba(155,114,248,0); }
    }
    .lifeline-active { animation:lifelineActivate .8s ease; }

    /* ── AI HINT BOX ── */
    .ai-hint-box {
      background:linear-gradient(135deg,rgba(155,114,248,.12),rgba(80,40,180,.06));
      border:1.5px solid rgba(155,114,248,.5);
      border-radius:12px; padding:1rem 1.2rem;
      position:relative; overflow:hidden;
    }
    .ai-hint-box::before {
      content:''; position:absolute; left:0; top:-100%; bottom:auto;
      width:100%; height:2px;
      background:linear-gradient(90deg,transparent,rgba(155,114,248,.7),transparent);
      animation:scanLine 1.4s ease forwards;
    }

    /* ── PHOTO MODAL ── */
    .photo-modal-overlay {
      position:fixed; inset:0; z-index:10001;
      background:rgba(0,0,0,.85);

  const { useState, useEffect, useRef, useCallback } = React;

     SOUND SYSTEM — lightweight HTML5 Audio
  ═══════════════════════════════════════════════════════════════ */
  const SoundCtx = React.createContext({ play:()=>{}, soundOn:true });

  const makeTone = (freq, type='sine', duration=0.12, gain=0.15, ramp=true) => {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const g   = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = type; osc.frequency.value = freq;
      g.gain.setValueAtTime(gain, ctx.currentTime);
      if (ramp) g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + duration);
      setTimeout(() => ctx.close(), (duration + 0.1) * 1000);
    } catch(e){}
  };

  const SOUNDS = {
    click:   () => makeTone(880, 'sine',    0.08,  0.12),
    verdict: () => { makeTone(660, 'sine',  0.09,  0.1); setTimeout(()=>makeTone(990,'sine',0.12,0.08),60); },
    conf:    () => makeTone(440, 'triangle',0.07,  0.08),
    lifeline:() => { makeTone(300,'sawtooth',0.15,0.06); setTimeout(()=>makeTone(600,'sine',0.2,0.1),80); },
    reveal:  () => {
      [0,80,160,240].forEach((delay,i) => setTimeout(()=>makeTone(220+i*110,'sine',.15,.12),delay));
    },
    coin:    () => { [0,60,120].forEach((d,i)=>setTimeout(()=>makeTone(800+i*200,'triangle',.1,.1),d)); }
  };

  const SoundProvider = ({ children, phase }) => {
    const [soundOn, setSoundOn] = useState(true);
    const play = useCallback((name) => { if (soundOn && SOUNDS[name]) SOUNDS[name](); }, [soundOn]);
    const hideToggle = phase === 'game'; // Hide during active investigation — overlaps with timer
    return (
      <SoundCtx.Provider value={{ play, soundOn, setSoundOn }}>
        {children}
        {!hideToggle && (
          <div className="sound-toggle" onClick={() => setSoundOn(v => !v)}>
            <span style={{fontSize:'.85rem'}}>{soundOn ? '🔊' : '🔇'}</span>
            <span>{soundOn ? 'SOUND ON' : 'SOUND OFF'}</span>

        )}

    );
  };

                    <span style={{ fontFamily:'Syne,sans-serif', fontWeight:700, fontSize:'.85rem', color:'var(--exl-orange)' }}>Exhibit C — Photo Evidence</span>
                    <span style={{ marginLeft:'auto', fontSize:'.75rem', color: currentRound === 3 ? 'var(--exl-orange)' : 'var(--green)' }}>{currentRound === 3 ? '🔓 ACTIVE' : '✓ REVIEWED'}</span>
                  </div>
                  <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'.5rem' }}>
                    {scenario.images.map((img, idx) => (
                      <div
                        key={idx}
                        className="ev-block photo-ev-block"
                        style={{ borderColor: img.redFlag ? 'rgba(251,191,36,.2)' : 'var(--exl-border)', textAlign:'center', padding:'.75rem .6rem' }}
                        onClick={() => { play('click'); setPhotoModal(img); }}
                      >
                        <div style={{ fontSize:'2rem', marginBottom:'.4rem' }}>📷</div>
                        <div style={{ fontWeight:600, fontSize:'.78rem', marginBottom: img.redFlag ? '.25rem' : 0 }}>{img.description}</div>
                        {img.redFlag && <div style={{ fontSize:'.68rem', color:'#FBBF24', marginTop:'.2rem' }}>⚠ Anomaly detected</div>}
                        <div style={{ fontSize:'.62rem', color:'var(--exl-muted)', marginTop:'.3rem' }}>Click to examine</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Exhibit D — Pattern Analysis */}
              {currentRound >= 4 && (
                <div className="g-card evidence-hover exhibit-unlock" style={{ padding:'1rem 1.1rem', flexShrink:0 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:'.55rem', marginBottom:'.7rem' }}>
                    <span style={{fontSize:'.95rem'}}>🔗</span>
                    <span style={{ fontFamily:'Syne,sans-serif', fontWeight:700, fontSize:'.85rem', color:'var(--exl-orange)' }}>Exhibit D — Pattern Analysis</span>
                    <span style={{ marginLeft:'auto', fontSize:'.75rem', color:'var(--exl-orange)' }}>🔓 ACTIVE</span>
                  </div>
                  <div className={`ev-block ${scenario.fraudRingData.connections > 0 ? 'fraud-ring-active' : ''}`} style={{
                    borderColor: scenario.fraudRingData.connections > 0 ? 'rgba(240,80,80,.3)' : 'rgba(34,208,122,.25)',
                    background: scenario.fraudRingData.connections > 0 ? 'rgba(240,80,80,.05)' : 'rgba(34,208,122,.05)'
                  }}>
                    <div style={{ display:'flex', alignItems:'center', gap:'.6rem', marginBottom:'.5rem', flexWrap:'wrap' }}>
                      {scenario.fraudRingData.connections > 0 && (
                        <span className="pulse2" style={{ width:'10px', height:'10px', borderRadius:'50%', background:'#F87171', display:'inline-block', boxShadow:'0 0 8px rgba(240,80,80,.6)', flexShrink:0 }} />
                      )}
                      <span className="badge" style={{
                        background: scenario.fraudRingData.connections > 0 ? 'rgba(240,80,80,.2)' : 'rgba(34,208,122,.15)',
                        color: scenario.fraudRingData.connections > 0 ? '#F87171' : '#22D07A',
                        border: `1px solid ${scenario.fraudRingData.connections > 0 ? 'rgba(240,80,80,.4)' : 'rgba(34,208,122,.3)'}`
                      }}>{scenario.fraudRingData.pattern}</span>
                      {scenario.fraudRingData.connections > 0 && <span style={{ fontSize:'.78rem', color:'#F87171', fontWeight:600 }}>{scenario.fraudRingData.connections} connected claims</span>}
                    </div>
                    <p style={{ fontSize:'.82rem', lineHeight:1.65 }}>{scenario.fraudRingData.note}</p>
                  </div>
                </div>
              )}

              {/* AI Hint after lifeline */}
              {revealedRedFlag && (
                <div className="ai-hint-box fade-up" style={{ flexShrink:0 }}>
                  <div style={{ display:'flex', gap:'.75rem', alignItems:'flex-start' }}>
                    <div style={{ width:'36px', height:'36px', borderRadius:'50%', background:'rgba(155,114,248,.2)', border:'1.5px solid rgba(155,114,248,.5)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, fontSize:'1rem' }}>⚡</div>
                    <div>
                      <div style={{ fontFamily:'Oswald,sans-serif', fontWeight:600, color:'#C4A9FF', fontSize:'.8rem', letterSpacing:'.1em', marginBottom:'.3rem' }}>AI INTELLIGENCE BRIEF</div>
                      <div style={{ fontSize:'.84rem', lineHeight:1.6, color:'var(--exl-text)' }}>🔍 {revealedRedFlag}</div>
                    </div>
                  </div>
                </div>
              )}
            </div>

            {/* RIGHT: Decision Panel */}
            <div style={{ position:'relative' }}>
              <div className="g-card-accent" style={{ padding:'1.1rem', position:'sticky', top:0 }}>
                <div style={{ fontSize:'.68rem', color:'var(--exl-orange)', letterSpacing:'.12em', fontWeight:700, marginBottom:'.75rem', fontFamily:'Oswald,sans-serif' }}>YOUR VERDICT</div>

                {/* Verdict buttons */}
                <div style={{ display:'flex', flexDirection:'column', gap:'.45rem', marginBottom:'.8rem' }}>
                  {[
                    { value:'fraud',      label:'🚨 FRAUDULENT', bg:'rgba(240,80,80,.15)', bc:'rgba(240,80,80,.6)', tc:'#F87171' },
                    { value:'legitimate', label:'✅ LEGITIMATE',  bg:'rgba(34,208,122,.12)', bc:'rgba(34,208,122,.5)', tc:'#22D07A' }
                  ].map(({ value, label, bg, bc, tc }) => (
                    <button key={value} className="exl-btn" onClick={() => { play('verdict'); onSetAnswer(value); }} style={{
                      width:'100%', padding:'.75rem',
                      borderRadius:'9px',
                      border:`2px solid ${playerAnswer===value ? bc : 'var(--exl-border)'}`,
                      background: playerAnswer===value ? bg : 'rgba(255,255,255,.02)',
                      color: playerAnswer===value ? tc : 'var(--exl-muted)',
                      fontWeight:700, fontSize:'.88rem',
                      transition:'all .18s',
                      transform: playerAnswer===value ? 'scale(1.02)' : 'none'
                    }}>{label}</button>
                  ))}
                </div>

                {playerAnswer && (<>
                  <Divider />

                  {/* Confidence */}
                  <div style={{ marginBottom:'.75rem' }}>
                    <div style={{ fontSize:'.65rem', color:'var(--exl-muted)', letterSpacing:'.09em', marginBottom:'.4rem', fontFamily:'Oswald,sans-serif', fontWeight:300 }}>CONFIDENCE LEVEL</div>
                    <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'.3rem' }}>
                      {['low','medium','high'].map(lvl => (
                        <button key={lvl} className="exl-btn" onClick={() => { play('conf'); onSetConfidence(lvl); }} style={{
                          padding:'.42rem', borderRadius:'8px',
                          border:`1.5px solid ${confidence===lvl ? 'var(--exl-orange)' : 'var(--exl-border)'}`,
                          background: confidence===lvl ? 'rgba(255,107,53,.14)' : 'transparent',
                          color: confidence===lvl ? 'var(--exl-orange)' : 'var(--exl-muted)',
                          fontSize:'.71rem', fontWeight:700
                        }}>{lvl.toUpperCase()}</button>
                      ))}
                    </div>
                    <div style={{ fontSize:'.65rem', color:'var(--exl-muted)', marginTop:'.3rem' }}>High confidence = 1.5× if correct</div>
                  </div>

                  {/* Red flags */}
                  {currentRound >= 2 && (
                    <div style={{ marginBottom:'.75rem' }}>
                      <div style={{ fontSize:'.65rem', color:'var(--exl-muted)', letterSpacing:'.09em', marginBottom:'.4rem', fontFamily:'Oswald,sans-serif', fontWeight:300 }}>
                        FLAG INDICATORS <span style={{ color:'var(--exl-orange)' }}>({selectedRedFlags.length}/3)</span>
                      </div>
                      <div style={{ display:'flex', flexDirection:'column', gap:'.25rem' }}>
                        {RED_FLAG_OPTIONS.map(flag => {
                          const active = selectedRedFlags.includes(flag);
                          const disabled = !active && selectedRedFlags.length >= 3;
                          return (
                            <button key={flag} className="exl-btn" onClick={() => onToggleRedFlag(flag)} disabled={disabled} style={{
                              width:'100%', padding:'.38rem .65rem',
                              borderRadius:'7px', textAlign:'left', justifyContent:'flex-start', gap:'.4rem',
                              border:`1px solid ${active ? 'rgba(255,107,53,.5)' : 'var(--exl-border)'}`,
                              background: active ? 'rgba(255,107,53,.1)' : 'transparent',
                              color: active ? 'var(--exl-text)' : disabled ? 'var(--exl-muted)' : 'var(--exl-text-soft)',
                              fontSize:'.73rem', opacity: disabled ? .4 : 1
                            }}>
                              <span style={{ color: active ? 'var(--exl-orange)' : 'var(--exl-border)', fontSize:'.62rem' }}>{active ? '◆' : '◇'}</span>{flag}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  <button className="exl-btn exl-btn-primary" style={{ width:'100%', padding:'.8rem', fontSize:'.9rem' }} onClick={() => onSubmit(playerAnswer)}>
                    Submit Verdict →
                  </button>
                </>)}

                <Divider />

                {/* Round tracker — shows only status dots, NOT score */}
                <div style={{ display:'flex', flexDirection:'column', gap:'.38rem' }}>
                  {ROUND_META.map(({ round, name, icon }) => (
                    <div key={round} style={{ display:'flex', alignItems:'center', gap:'.5rem' }}>
                      <div className="round-dot" style={{
                        background: currentRound > round ? 'var(--green)' : currentRound === round ? 'var(--exl-orange)' : 'var(--exl-border)',
                        color:'#fff', fontSize: currentRound > round ? '.58rem' : '.78rem'
                      }}>
                        {currentRound > round ? '✓' : icon}
                      </div>
                      <span style={{ fontSize:'.78rem', color: currentRound >= round ? 'var(--exl-text)' : 'var(--exl-muted)', fontWeight: currentRound === round ? 600 : 400, flex:1 }}>{name}</span>
                      {/* No points shown — score hidden during game */}
                      {roundAnswers.find(r => r.round === round) && (
                        <span style={{ fontSize:'.7rem', color:'var(--exl-muted)', fontStyle:'italic' }}>done</span>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>

        {/* Photo Modal */}
        {photoModal && (
          <div className="photo-modal-overlay" onClick={() => setPhotoModal(null)}>
            <div className="photo-modal-inner" onClick={e => e.stopPropagation()}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1.25rem' }}>
                <div style={{ fontFamily:'Syne,sans-serif', fontWeight:700, fontSize:'1rem' }}>📷 {photoModal.description}</div>
                <button style={{ background:'none', border:'none', color:'var(--exl-muted)', fontSize:'1.4rem', cursor:'pointer' }} onClick={() => setPhotoModal(null)}>×</button>
              </div>
              {/* Simulated photo block */}
              <div style={{ background:'var(--exl-surface2)', border:'1px solid var(--exl-border)', borderRadius:'10px', height:'220px', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:'1rem', fontSize:'4rem' }}>📷</div>
              {/* Metadata toggle */}
              <div style={{ background:'rgba(0,0,0,.4)', border:'1px solid var(--exl-border)', borderRadius:'8px', padding:'.75rem 1rem' }}>
                <div style={{ fontSize:'.65rem', color:'var(--exl-orange)', letterSpacing:'.12em', fontFamily:'Oswald,sans-serif', marginBottom:'.5rem' }}>METADATA LAYER</div>
                {photoModal.redFlag
                  ? <div style={{ fontSize:'.82rem', color:'#FBBF24', lineHeight:1.55 }}>⚠ {photoModal.redFlag}</div>
                  : <div style={{ fontSize:'.82rem', color:'var(--green)', lineHeight:1.55 }}>✓ No metadata anomalies detected</div>
                }
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };

  /* ═══════════════════════════════════════════════════════════════
     PART 6+7 — REVEAL SCREEN with suspenseful score reveal
  ═══════════════════════════════════════════════════════════════ */
  const RevealScreen = ({ scenario, roundAnswers, playerName, onContinue }) => {
    const { play } = React.useContext(SoundCtx);
    const [revealed, setRevealed] = useState(false);
    const [phase, setPhase] = useState('calculating'); // calculating | counting | done
    const [displayScore, setDisplayScore] = useState(0);
    const scenarioScore = roundAnswers.reduce((s,r) => s + r.points, 0);

    useEffect(() => {
      const t1 = setTimeout(() => setRevealed(true), 400);
      // Score reveal sequence
      const t2 = setTimeout(() => { setPhase('counting'); play('reveal'); }, 1800);
      return () => { clearTimeout(t1); clearTimeout(t2); };
    }, []);

    useEffect(() => {
      if (phase !== 'counting') return;
      let start = 0;
      const steps = 40;
      const inc = scenarioScore / steps;
      const interval = setInterval(() => {
        start += inc;
        if (start >= scenarioScore) {
          setDisplayScore(scenarioScore);
          setPhase('done');
          play('coin');
          clearInterval(interval);
        } else {
          setDisplayScore(Math.floor(start));
        }
      }, 35);
      return () => clearInterval(interval);
    }, [phase]);

    const playerGotItRight = roundAnswers.some(r => r.isCorrect);
    const isFraud = scenario.actualVerdict === 'fraud';
    const firstCorrectRound = roundAnswers.find(r => r.isCorrect)?.round;

    const getVerdict = () => {
      if (!playerGotItRight) return { headline:'The Algorithm Saw It Differently', sub:'The AI identified patterns that human review initially missed.', color:'rgba(240,80,80,.6)', bg:'rgba(240,80,80,.08)' };
      if (firstCorrectRound === 1) return { headline:'You Outpaced the AI', sub:'Your instinct aligned with machine intelligence — before the algorithm had all the data.', color:'rgba(34,208,122,.6)', bg:'rgba(34,208,122,.07)' };
      if (firstCorrectRound <= 2) return { headline:'Solid Investigative Instinct', sub:"Your assessment matched the AI's conclusion with limited evidence in hand.", color:'rgba(34,208,122,.5)', bg:'rgba(34,208,122,.06)' };
      return { headline:'Your Instinct Aligns With Machine Intelligence', sub:"You reached the same conclusion as EXL's AI agents — with deeper evidence review.", color:'rgba(255,107,53,.5)', bg:'rgba(255,107,53,.07)' };
    };
    const vd = getVerdict();

    return (
      <div style={{ minHeight:'100vh', padding:'2rem', background:'var(--exl-bg)', position:'relative' }}>
        <div style={{ maxWidth:'1060px', margin:'0 auto' }}>

          {/* Score reveal overlay */}
          {(phase === 'calculating' || phase === 'counting') && (
            <div style={{ position:'fixed', inset:0, zIndex:100, background:'rgba(4,5,10,.92)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', backdropFilter:'blur(12px)' }}>
              {phase === 'calculating' && (
                <div style={{ textAlign:'center' }}>
                  <div className="pulse2" style={{ fontFamily:'Oswald,sans-serif', fontSize:'.85rem', letterSpacing:'.25em', color:'var(--exl-orange)', marginBottom:'1.5rem' }}>CALCULATING CASE SCORE…</div>
                  <div style={{ display:'flex', gap:'.5rem', justifyContent:'center' }}>
                    {[0,1,2].map(i => (
                      <div key={i} style={{ width:'8px', height:'8px', borderRadius:'50%', background:'var(--exl-orange)', animation:`pulse2 1.2s ${i*.2}s ease infinite` }} />
                    ))}
                  </div>
                </div>
              )}
              {phase === 'counting' && (
                <div style={{ textAlign:'center' }}>
                  <div style={{ fontFamily:'Oswald,sans-serif', fontSize:'.85rem', letterSpacing:'.25em', color:'var(--exl-muted)', marginBottom:'1rem' }}>CASE SCORE</div>
                  <div style={{ fontFamily:'Bebas Neue,sans-serif', fontSize:'7rem', lineHeight:1, background:'linear-gradient(135deg,#fff,var(--exl-orange))', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' }}>
                    {displayScore.toLocaleString()}
                  </div>
                  <div style={{ fontFamily:'Oswald,sans-serif', fontSize:'.75rem', letterSpacing:'.2em', color:'var(--exl-muted)', marginTop:'.5rem' }}>POINTS</div>
                </div>
              )}
            </div>
          )}

          {/* Outcome header */}
          <div className="scale-in" style={{ border:`1.5px solid ${vd.color}`, background:vd.bg, borderRadius:'16px', padding:'1.5rem 2rem', textAlign:'center', marginBottom:'1.5rem' }}>
            <div style={{ fontSize:'2.5rem', marginBottom:'.4rem' }}>{playerGotItRight ? '🎯' : '🧠'}</div>
            <h1 style={{ fontFamily:'Bebas Neue,sans-serif', fontSize:'clamp(1.8rem,4vw,2.5rem)', letterSpacing:'.06em', marginBottom:'.3rem' }}>{vd.headline}</h1>
            <p style={{ color:'var(--exl-text-soft)', fontSize:'.9rem', maxWidth:'520px', margin:'0 auto' }}>{vd.sub}</p>
          </div>

          {/* Two column */}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'1.1rem', marginBottom:'1.2rem' }}>

            {/* Player column */}
            <div className="g-card" style={{ padding:'1.25rem', border:'1.5px solid rgba(155,114,248,.35)' }}>
              <div style={{ fontSize:'.65rem', color:'var(--purple)', letterSpacing:'.14em', fontWeight:700, marginBottom:'.8rem', fontFamily:'Oswald,sans-serif' }}>YOUR INVESTIGATION — DET. {playerName.toUpperCase()}</div>
              <div style={{ display:'flex', flexDirection:'column', gap:'.4rem' }}>
                {roundAnswers.map(ans => (
                  <div key={ans.round} style={{ background:'rgba(155,114,248,.07)', borderRadius:'9px', padding:'.6rem .8rem', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                    <div>
                      <div style={{ fontWeight:600, fontSize:'.82rem', marginBottom:'.15rem' }}>Round {ans.round}</div>
                      <div style={{ fontSize:'.73rem', color:'var(--exl-muted)' }}>
                        {ans.answer==='fraud'?'🚨 Fraud':ans.answer==='legitimate'?'✅ Legitimate':'⏱ No Answer'}
                        {ans.answer!=='no-answer' && ` · ${ans.confidence}`}
                      </div>
                    </div>
                    <div style={{ textAlign:'right' }}>
                      <div style={{ fontSize:'1rem', fontWeight:700, color: ans.isCorrect ? 'var(--green)' : 'var(--red)' }}>{ans.isCorrect ? '✓' : '✗'}</div>
                      <div style={{ fontSize:'.73rem', color:'var(--purple)', fontWeight:700 }}>+{ans.points}</div>
                    </div>
                  </div>
                ))}
              </div>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:'.8rem', paddingTop:'.8rem', borderTop:'1px solid var(--exl-border)' }}>
                <span style={{ fontWeight:600, fontSize:'.86rem' }}>Score This Case</span>
                {phase === 'done' ? (
                  <span className="score-reveal-anim" style={{ fontFamily:'Bebas Neue,sans-serif', fontSize:'1.8rem', letterSpacing:'.04em', color:'var(--purple)' }}>{scenarioScore.toLocaleString()}</span>
                ) : (
                  <span style={{ fontFamily:'Bebas Neue,sans-serif', fontSize:'1.8rem', color:'var(--exl-muted)' }}>—</span>
                )}
              </div>
            </div>

            {/* AI Lab column */}
            <div className={`g-card ai-scan ${revealed ? 'reveal-glow' : ''}`} style={{ padding:'1.25rem', border:`1.5px solid ${isFraud?'rgba(240,80,80,.4)':'rgba(34,208,122,.35)'}` }}>
              <div style={{ fontSize:'.65rem', color: isFraud ? 'var(--red)' : 'var(--green)', letterSpacing:'.14em', fontWeight:700, marginBottom:'.8rem', fontFamily:'Oswald,sans-serif' }}>EXL AI LAB ANALYSIS</div>
              <div style={{ textAlign:'center', marginBottom:'1rem' }}>
                <div style={{ fontSize:'.65rem', color:'var(--exl-muted)', letterSpacing:'.1em', marginBottom:'.3rem' }}>
                  {isFraud ? 'FRAUD RISK SCORE' : 'LEGITIMACY CONFIDENCE'}
                </div>
                {/* For fraud: show fraudScore (high = suspicious). For legit: show 100-fraudScore (high = legitimate) */}
                <div style={{ fontFamily:'Bebas Neue,sans-serif', fontWeight:400, fontSize:'3.5rem', lineHeight:1, marginBottom:'.4rem', color: isFraud ? '#F87171' : '#22D07A' }}>
                  {isFraud ? scenario.fraudScore : (100 - scenario.fraudScore)}
                </div>
                <span className="badge" style={{ background: isFraud?'rgba(240,80,80,.18)':'rgba(34,208,122,.13)', color: isFraud?'#F87171':'#22D07A', border:`1px solid ${isFraud?'rgba(240,80,80,.4)':'rgba(34,208,122,.3)'}`, fontSize:'.8rem', padding:'.28rem .9rem' }}>
                  {isFraud ? '🚨 FRAUDULENT' : '✅ LEGITIMATE'}
                </span>
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:'.5rem' }}>
                {Object.entries(scenario.aiAgentFindings).map(([agent, data]) => {
                  // For legitimate cases, invert gauge to show legitimacy confidence
                  const displayScore = isFraud ? data.score : (100 - data.score);
                  const barColor = isFraud
                    ? (data.score > 70 ? 'linear-gradient(90deg,#F05050,#FF6B35)' : data.score > 40 ? 'linear-gradient(90deg,#FBBF24,#F59E0B)' : 'linear-gradient(90deg,#22D07A,#059669)')
                    : 'linear-gradient(90deg,#22D07A,#16A34A)';
                  return (
                    <div key={agent} style={{ background:'var(--exl-surface2)', borderRadius:'8px', padding:'.55rem .75rem' }}>
                      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'.3rem' }}>
                        <span style={{ fontSize:'.72rem', color:'var(--exl-muted)' }}>{camelLabel(agent)}</span>
                        <span style={{ fontWeight:700, fontSize:'.72rem', color: isFraud ? 'var(--exl-orange)' : 'var(--green)' }}>{displayScore}%</span>
                      </div>
                      <div className="gauge-track" style={{ marginBottom:'.28rem' }}>
                        <div className="gauge-fill" style={{ width: revealed ? `${displayScore}%` : '0%', background: barColor }} />
                      </div>
                      <div style={{ fontSize:'.7rem', color:'var(--exl-text-soft)', lineHeight:1.4 }}>{data.finding}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* Red flags */}
          {scenario.redFlags.length > 0 && (
            <div className="g-card" style={{ padding:'1.2rem', marginBottom:'1.2rem', border:'1.5px solid rgba(251,146,60,.25)' }}>
              <div style={{ fontSize:'.65rem', color:'#FB923C', letterSpacing:'.14em', fontWeight:700, marginBottom:'.8rem', fontFamily:'Oswald,sans-serif' }}>AI-IDENTIFIED RED FLAGS</div>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))', gap:'.45rem' }}>
                {scenario.redFlags.map((flag, i) => (
                  <div key={i} style={{ background:'rgba(251,146,60,.06)', border:'1px solid rgba(251,146,60,.2)', borderRadius:'9px', padding:'.55rem .85rem', display:'flex', gap:'.45rem', alignItems:'flex-start' }}>
                    <span style={{ color:'#FBBF24', fontSize:'.85rem', marginTop:'.04rem' }}>⚠</span>
                    <span style={{ fontSize:'.8rem', lineHeight:1.55 }}>{flag}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div style={{ textAlign:'center' }}>
            <button className="exl-btn exl-btn-primary" style={{ fontSize:'1rem', padding:'1rem 2.5rem' }} onClick={() => { play('click'); onContinue(); }}>View Leaderboard →</button>
          </div>
        </div>
      </div>
    );
  };

  /* ═══════════════════════════════════════════════════════════════
     SCREEN: LEADERBOARD — Dramatic tier-based design
  ═══════════════════════════════════════════════════════════════ */
  const LeaderboardScreen = ({ playerName, finalScore, leaderboard, onPlayAnother, onRestart }) => {
    const { play } = React.useContext(SoundCtx);
    const playerRank = leaderboard.findIndex(e => e.name === playerName && e.score === finalScore) + 1;
    const title = getTitle(finalScore);
    const medal = i => i===0?{bg:'#F5C842',tc:'#3B2900',icon:'🥇'}:i===1?{bg:'#8A9AB0',tc:'#1A2030',icon:'🥈'}:i===2?{bg:'#CD7C4A',tc:'#2A1500',icon:'🥉'}:{bg:'var(--exl-border)',tc:'var(--exl-muted)',icon:''};

    useEffect(() => { play('reveal'); }, []);

    return (
      <div style={{ height:'100vh', overflow:'hidden', display:'grid', gridTemplateColumns:'1fr 1fr', background:'var(--exl-bg)' }}>
        {/* LEFT — Player result */}
        <div style={{ display:'flex', flexDirection:'column', justifyContent:'center', padding:'3rem 2.5rem 3rem 4rem', borderRight:'1px solid var(--exl-border)', position:'relative' }}>
          <div style={{ opacity:.5, marginBottom:'2rem' }}><EXLLogo size="sm" /></div>

          <div style={{ marginBottom:'2rem' }}>
            <div style={{ fontFamily:'Oswald,sans-serif', fontSize:'.78rem', letterSpacing:'.2em', color:'var(--exl-orange)', marginBottom:'.5rem', fontWeight:300 }}>INVESTIGATION CLOSED</div>
            <h1 className="title-main" style={{ fontSize:'clamp(3rem,6vw,5rem)' }}>{title}</h1>
            <div style={{ fontFamily:'Oswald,sans-serif', fontSize:'.8rem', letterSpacing:'.12em', color:'var(--exl-muted)', fontWeight:300, marginTop:'.3rem' }}>FILED BY DET. {playerName.toUpperCase()}</div>
          </div>

          {/* Score cards */}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'.75rem', marginBottom:'2.5rem' }}>
            {[
              { label:'FINAL SCORE', val:finalScore.toLocaleString(), accent:'var(--exl-orange)' },
              { label:'RANK',        val:`#${playerRank}`,             accent:'#F5C842' },
              { label:'TITLE',       val:title,                        accent:'#22D07A' }
            ].map(({ label, val, accent }) => (
              <div key={label} className="scale-in" style={{ background:'var(--exl-surface)', border:'1px solid var(--exl-border)', borderRadius:'12px', padding:'1.1rem .9rem', textAlign:'center' }}>
                <div style={{ fontSize:'.6rem', color:accent, letterSpacing:'.14em', fontFamily:'Oswald,sans-serif', fontWeight:400, marginBottom:'.4rem' }}>{label}</div>
                <div style={{ fontFamily:'Bebas Neue,sans-serif', fontSize:'1.4rem', letterSpacing:'.04em', color:accent }}>{val}</div>
              </div>
            ))}
          </div>

          <div style={{ display:'flex', gap:'.75rem' }}>
            <button className="exl-btn exl-btn-primary" style={{ padding:'.95rem 1.8rem', fontSize:'.9rem' }} onClick={() => { play('click'); onPlayAnother(); }}>Investigate Another Case</button>
            <button className="exl-btn exl-btn-ghost" style={{ padding:'.85rem 1.4rem', fontSize:'.88rem' }} onClick={() => { play('click'); onRestart(); }}>Start Over</button>
          </div>
        </div>

        {/* RIGHT — Leaderboard */}
        <div style={{ display:'flex', flexDirection:'column', justifyContent:'center', padding:'3rem 3rem 3rem 2.5rem', position:'relative', overflow:'hidden' }}>
          <div style={{ position:'absolute', inset:0, backgroundImage:'linear-gradient(var(--exl-border) 1px,transparent 1px)', backgroundSize:'100% 52px', opacity:.25 }} />
          <div style={{ position:'relative', zIndex:1 }}>
            <div style={{ fontFamily:'Oswald,sans-serif', fontSize:'.78rem', letterSpacing:'.2em', color:'var(--exl-orange)', fontWeight:300, marginBottom:'1.25rem' }}>INVESTIGATION LEDGER — TOP DETECTIVES</div>
            <div style={{ display:'flex', flexDirection:'column', gap:'.5rem' }}>
              {leaderboard.map((e, i) => {
                const isPlayer = e.name === playerName && e.score === finalScore;
                const m = medal(i);
                return (
                  <div key={i}
                    className={`lb-row ${i===0?'lb-tier-1':i===1?'lb-tier-2':i===2?'lb-tier-3':''}`}
                    style={{
                      border:`1px solid ${isPlayer?'rgba(255,107,53,.55)':'var(--exl-border)'}`,
                      background: isPlayer ? 'rgba(255,107,53,.08)' : undefined,
                      transform: isPlayer ? 'scale(1.015)' : 'none',
                      transition:'transform .2s',
                      borderRadius:'11px', padding:'.7rem 1rem'
                    }}>
                    <div style={{ width:'32px', height:'32px', borderRadius:'50%', background:m.bg, color:m.tc, display:'flex', alignItems:'center', justifyContent:'center', fontWeight:800, fontSize:'.78rem', flexShrink:0 }}>
                      {m.icon || (i+1)}
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontWeight:600, fontSize:'.88rem', color: isPlayer?'var(--exl-orange)':'var(--exl-text)' }}>{e.name}{isPlayer?' ← YOU':''}</div>
                      <div style={{ fontSize:'.7rem', color:'var(--exl-muted)', fontFamily:'Oswald,sans-serif', fontWeight:300, letterSpacing:'.06em' }}>{e.title}</div>
                    </div>
                    <div style={{ fontFamily:'Bebas Neue,sans-serif', fontSize:'1.3rem', letterSpacing:'.04em', color: isPlayer?'var(--exl-orange)':i===0?'#F5C842':'var(--exl-text)' }}>{e.score.toLocaleString()}</div>
                  </div>
                );
              })}
            </div>

            <div style={{ textAlign:'center', marginTop:'2rem', fontSize:'.68rem', color:'var(--exl-muted)', letterSpacing:'.1em', fontFamily:'Oswald,sans-serif', fontWeight:300 }}>
              EXL AI CLAIMS INTELLIGENCE · SIMULATION ENGINE
            </div>
          </div>
        </div>
      </div>
    );
  };




  /* ═══════════════════════════════════════════════════════════════
     ROOT APP — STATE MACHINE (logic unchanged, sound enhanced)
  ═══════════════════════════════════════════════════════════════ */
  const App = ({ phase, setPhase }) => {
    const { play } = React.useContext(SoundCtx);
    const [playerName, setPlayerName]               = useState('');
    const [selectedScenarioIdx, setSelectedScenarioIdx] = useState(null);
    const [leaderboard, setLeaderboard]             = useState(loadLeaderboard);
    const [currentRound, setCurrentRound]           = useState(1);
    const [playerAnswer, setPlayerAnswer]           = useState(null);
    const [confidence, setConfidence]               = useState('medium');
    const [selectedRedFlags, setSelectedRedFlags]   = useState([]);
    const [timeLeft, setTimeLeft]                   = useState(60);
    const [timerActive, setTimerActive]             = useState(false);
    const [totalScore, setTotalScore]               = useState(0);
    const [roundAnswers, setRoundAnswers]           = useState([]);
    const [lifelineUsed, setLifelineUsed]           = useState(false);
    const [revealedRedFlag, setRevealedRedFlag]     = useState(null);
    const [finalScore, setFinalScore]               = useState(0);
    const prevRound = useRef(1);

    const scenario = selectedScenarioIdx !== null ? SCENARIOS[selectedScenarioIdx] : null;

    /* Play exhibit unlock sound when round advances */
    useEffect(() => {
      if (phase === 'game' && currentRound !== prevRound.current) {
        prevRound.current = currentRound;
        // staggered tones for exhibit unlock feel
        setTimeout(() => makeTone(520, 'sine', 0.18, 0.1), 0);
        setTimeout(() => makeTone(660, 'sine', 0.14, 0.08), 100);
      }
    }, [currentRound, phase]);

    /* Timer — unchanged */
    useEffect(() => {
      if (!timerActive) return;
      if (timeLeft <= 0) { handleTimeUp(); return; }
      const id = setTimeout(() => setTimeLeft(t => t - 1), 1000);
      return () => clearTimeout(id);
    }, [timeLeft, timerActive]);

    const resetGameState = () => {
      setCurrentRound(1); setPlayerAnswer(null); setConfidence('medium');
      setSelectedRedFlags([]); setTimeLeft(60); setTimerActive(false);
      setTotalScore(0); setRoundAnswers([]); setLifelineUsed(false);
      setRevealedRedFlag(null); setFinalScore(0);
      prevRound.current = 1;
    };

    const handleStartGame = (idx) => {
      resetGameState();
      setSelectedScenarioIdx(idx);
      setTimerActive(true);
      setPhase('game');
    };

    const handleTimeUp = () => { setTimerActive(false); handleSubmitAnswer('no-answer'); };

    /* Scoring — EXACT, unchanged */
    const handleSubmitAnswer = (answer) => {
      setTimerActive(false);
      const sc = SCENARIOS[selectedScenarioIdx];
      const isCorrect = answer === sc.actualVerdict;
      let points = 0;
      if (answer !== 'no-answer') {
        if (isCorrect) {
          const base = {1:1000,2:750,3:500,4:300}[currentRound];
          const mult = {high:1.5,medium:1.2,low:1.0}[confidence];
          points = Math.round(base * mult);
          const cf = selectedRedFlags.filter(f => sc.redFlags.includes(f)).length;
          points += cf * 200;
          const spent = 60 - timeLeft;
          if (spent < 90) points += 250; else if (spent < 120) points += 150;
          if (lifelineUsed) points -= 200;
        } else {
          points = Math.round(100 * (confidence === 'high' ? 0.5 : 0.8));
        }
      }
      // Sound on submit
      play(isCorrect ? 'verdict' : 'conf');
      const newRA = [...roundAnswers, { round:currentRound, answer, confidence, points, isCorrect, timeSpent:60-timeLeft }];
      setRoundAnswers(newRA);
      setTotalScore(prev => prev + points);

      if (currentRound < 4) {
        setCurrentRound(r => r+1);
        setPlayerAnswer(null); setConfidence('medium');
        setSelectedRedFlags([]); setTimeLeft(60); setTimerActive(true);
      } else {
        const score = newRA.reduce((s,r) => s+r.points, 0);
        setFinalScore(score);
        const updated = [...leaderboard, { name:playerName, score, title:getTitle(score) }]
          .sort((a,b) => b.score - a.score).slice(0,10);
        setLeaderboard(updated);
        saveLeaderboard(updated);
        setPhase('reveal');
      }
    };

    const handleLifeline = () => {
      if (lifelineUsed || !scenario.redFlags.length) return;
      setLifelineUsed(true);
      setRevealedRedFlag(scenario.redFlags[Math.floor(Math.random()*scenario.redFlags.length)]);
    };

    const handleToggleRedFlag = flag => {
      if (selectedRedFlags.includes(flag)) setSelectedRedFlags(p => p.filter(f=>f!==flag));
      else if (selectedRedFlags.length < 3) setSelectedRedFlags(p => [...p, flag]);
    };

    const handlePlayAnother = () => { resetGameState(); setPhase('case-selection'); };
    const handleRestart     = () => { resetGameState(); setPlayerName(''); setSelectedScenarioIdx(null); setPhase('welcome'); };

    /* ── Render ── */
    if (phase === 'welcome')        return <WelcomeScreen onNext={() => { play('click'); setPhase('name-entry'); }} leaderboard={leaderboard} />;
    if (phase === 'name-entry')     return <NameEntry onStart={n => { setPlayerName(n); setPhase('case-selection'); }} />;
    if (phase === 'case-selection') return <CaseSelection playerName={playerName} onSelect={handleStartGame} />;
    if (phase === 'game' && scenario) return (
      <GameScreen
        playerName={playerName} scenario={scenario} currentRound={currentRound}
        timeLeft={timeLeft} playerAnswer={playerAnswer}
        confidence={confidence} selectedRedFlags={selectedRedFlags}
        lifelineUsed={lifelineUsed} revealedRedFlag={revealedRedFlag} roundAnswers={roundAnswers}
        onSetAnswer={setPlayerAnswer} onSetConfidence={setConfidence}
        onToggleRedFlag={handleToggleRedFlag} onSubmit={handleSubmitAnswer} onLifeline={handleLifeline}
      />
    );
    if (phase === 'reveal' && scenario) return (
      <RevealScreen scenario={scenario} roundAnswers={roundAnswers} playerName={playerName} onContinue={() => setPhase('leaderboard')} />
    );
    if (phase === 'leaderboard') return (
      <LeaderboardScreen playerName={playerName} finalScore={finalScore} leaderboard={leaderboard} onPlayAnother={handlePlayAnother} onRestart={handleRestart} />
    );
    return null;
  };

  const Root = () => {
    const [phase, setPhaseState] = useState('welcome');
    return (
      <SoundProvider phase={phase}>
        <App phase={phase} setPhase={setPhaseState} />
      </SoundProvider>
    );
  };

  ReactDOM.render(<Root />, document.getElementById('root'));
</script>
</body>
</html>
